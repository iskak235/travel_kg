{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TravelKG{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">Travel<span>KG</span></div>

        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav id="nav-menu">
            <a href="{% url 'index' %}">Главная</a>
            <a href="{% url 'about' %}">О компании</a>
            <a href="{% url 'tours' %}">Туры</a>
            <a href="{% url 'contact' %}">Контакты</a>
            <button class="btn-call-mobile" onclick="openModal()">Заказать звонок</button>
        </nav>

        <button class="btn-call" onclick="openModal()">Заказать звонок</button>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="creative-footer">
        <div class="footer-wrap">
            <div class="f-brand">
                <h2>Travel<span class="red">KG</span></h2>
                <p>Ар бир саякат — бул жаңы жашоо.</p>
            </div>

            <div class="f-stats">
                <div class="stat-item"><strong>10+</strong> <small>жыл тажрыйба</small></div>
                <div class="stat-item"><strong>150</strong> <small>кардарлар</small></div>
            </div>
        </div>
        <div class="f-copyright">&copy; 2026 TravelKG.</div>
    </footer>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('nav-menu');
            nav.classList.toggle('active');
        }

        function openModal() {
            document.getElementById('callbackModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('callbackModal').style.display = 'none';
        }
    </script>
</body>
</html>
