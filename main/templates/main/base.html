{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TravelKG{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

 <header>
    <div class="logo">Travel<span>KG</span></div>

    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="nav-menu" id="nav-menu">
        <div class="menu-header">
            <span class="menu-title">МЕНЮ</span>
            <span class="close-icon" onclick="closeMenu()">&times;</span>
        </div>

        <div class="menu-list">
            <a href="{% url 'index' %}" onclick="closeMenu()">Башкы бет</a>
            <a href="{% url 'about' %}" onclick="closeMenu()">Биз жөнүндө</a>
            <a href="{% url 'tours' %}" onclick="closeMenu()">Турлар</a>
            <a href="{% url 'contact' %}" onclick="closeMenu()">Байланыш</a>
        </div>

        <button class="menu-action-btn" onclick="openModal(); closeMenu();">Чалууну буюртмалоо</button>
    </nav>

    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
</header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="creative-footer">
        <div class="footer-wrap">
            <div class="f-brand">
                <h2>Travel<span class="red">KG</span></h2>
                <p>Ар бир саякат — бул жаңы жашоо.</p>
            </div>
            <div class="f-stats">
                <div class="stat-item"><strong>10+</strong> <small>жыл тажрыйба</small></div>
                <div class="stat-item"><strong>150</strong> <small>кардарлар</small></div>
            </div>
        </div>
        <div class="f-copyright">&copy; 2026 TravelKG.</div>
    </footer>

    <script>
       const hamburger = document.getElementById('hamburger');
const navMenu = document.getElementById('nav-menu');
const overlay = document.getElementById('menu-overlay');

hamburger.addEventListener('click', () => {
    navMenu.classList.add('active');
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
});

function closeMenu() {
    navMenu.classList.remove('active');
    overlay.classList.remove('active');
    document.body.style.overflow = 'auto';
}
    </script>
</body>
</html>
